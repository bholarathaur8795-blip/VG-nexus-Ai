<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VG NEXUS AI</title>
    <style>
        body { background: #05070a; color: white; font-family: sans-serif; margin: 0; padding: 15px; }
        .header { border-bottom: 2px solid #00d2ff; padding-bottom: 10px; margin-bottom: 20px; }
        .logo { font-size: 24px; font-weight: bold; color: #00d2ff; }
        .dashboard { background: #111827; border-radius: 15px; padding: 20px; border: 1px solid #1e293b; }
        .price { font-size: 32px; color: #00ff41; font-weight: 900; margin: 10px 0; }
        .chart { height: 180px; width: 100%; background: #000; margin: 20px 0; border-radius: 8px; }
        .btns { display: flex; gap: 10px; }
        .btn { flex: 1; padding: 15px; border: none; border-radius: 8px; color: white; font-weight: bold; }
    </style>
</head>
<body>
    <div class="header"><div class="logo">VG NEXUS AI</div></div>
    <div class="dashboard">
        <div style="color: #64748b;">LIVE MARKET INDEX</div>
        <div class="price" id="p">$1,240.50</div>
        <div class="chart">
            <svg viewBox="0 0 500 150" preserveAspectRatio="none" style="width:100%; height:100%;">
                <path d="M0,150 L0,130 L100,140 L200,90 L300,110 L400,30 L500,40 L500,150 Z" fill="rgba(0,210,255,0.2)"></path>
                <path d="M0,130 L100,140 L200,90 L300,110 L400,30 L500,40" fill="none" stroke="#00d2ff" stroke-width="3"></path>
            </svg>
        </div>
        <div class="btns">
            <button class="btn" style="background: #f6465d;">PUT</button>
            <button class="btn" style="background: #0ecb81;">CALL</button>
        </div>
    </div>
    <script>
        setInterval(() => {
            let val = 1240 + (Math.random() * 10);
            document.getElementById('p').innerText = "$" + val.toFixed(2);
        }, 1000);
    </script>
</body>
</html>
