<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VG Nexus AI - Pioneering the Future</title>
    <style>
        body { margin: 0; padding: 0; background: radial-gradient(circle, #0a1128 0%, #010101 100%); color: #ffffff; font-family: sans-serif; overflow: hidden; display: flex; justify-content: center; align-items: center; height: 100vh; text-align: center; }
        .globe-container { position: absolute; width: 300px; height: 300px; border-radius: 50%; background: radial-gradient(circle, rgba(0, 255, 255, 0.3) 0%, rgba(0, 0, 0, 0) 70%); box-shadow: 0 0 50px rgba(0, 255, 255, 0.5), 0 0 100px rgba(128, 0, 128, 0.3); animation: pulseGlobe 4s infinite alternate; z-index: 1; }
        @keyframes pulseGlobe { 0% { transform: scale(1); } 100% { transform: scale(1.05); } }
        .content { position: relative; z-index: 2; }
        h1 { font-size: 3.5rem; color: #00ffff; text-shadow: 0 0 15px #00ffff; margin: 0; }
        h2 { font-size: 1.2rem; color: #ccc; font-weight: 300; }
    </style>
</head>
<body>
    <div class="globe-container"></div>
    <div class="content">
        <h1>VG Nexus AI</h1>
        <h2>Pioneering the Future of Intelligence</h2>
    </div>
</body>
</html>
