<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VG NEXUS AI | Payment Dashboard</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #ffffff; margin: 0; color: #333; text-align: center; }
        .header { padding: 30px; border-bottom: 2px solid #f0f0f0; background: #fafafa; }
        h1 { color: #007bff; letter-spacing: 3px; margin: 0; font-size: 32px; }
        
        /* बैलेंस सेक्शन */
        .balance-card { background: #f8f9fa; margin: 20px auto; padding: 20px; width: 80%; border-radius: 15px; border: 1px solid #eee; }
        .amount { font-size: 40px; font-weight: bold; color: #28a745; }
        
        /* आपकी फोटो */
        .main-img { width: 90%; max-width: 600px; border-radius: 15px; margin: 20px 0; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        
        /* बटन सेक्शन */
        .btn-container { display: flex; flex-direction: column; gap: 15px; padding: 20px; align-items: center; }
        .pay-btn { width: 85%; padding: 15px; border-radius: 10px; border: none; font-size: 18px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        
        .btn-paypal { background: #ffc439; color: #003087; }
        .btn-card { background: #007bff; color: white; }
        .btn-crypto { background: #333; color: gold; }
        .btn-gpay { background: #ffffff; border: 1px solid #ccc; color: #5f6368; }
        
        .footer { margin-top: 50px; padding: 20px; font-size: 12px; color: #999; }
    </style>
</head>
<body>

    <div class="header">
        <h1>VG NEXUS AI</h1>
        <p>Advanced Trading Intelligence</p>
    </div>

    <div class="balance-card">
        <p>Total Portfolio Balance</p>
        <div class="amount">$24,849.20</div>
        <p style="color: #28a745;">+ 12.5% Today</p>
    </div>

    <img src="https://raw.githubusercontent.com/bholarathaur8795-blip/VG-nexus-Ai/main/1772394873517.png" class="main-img">

    <div class="btn-container">
        <button class="pay-btn btn-paypal">Pay with PayPal</button>
        <button class="pay-btn btn-card">Credit / Debit Card</button>
        <button class="pay-btn btn-crypto">Pay with Crypto (BTC/ETH)</button>
        <button class="pay-btn btn-gpay">Google Pay</button>
        <button class="pay-btn" style="background:#28a745; color:white;">Add Funds via Bank</button>
    </div>

    <div class="footer">
        © 2026 VG NEXUS AI - All Rights Reserved. Secure SSL Encrypted.
    </div>

</body>
</html>
